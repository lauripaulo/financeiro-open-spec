{% extends "base.html" %}

{% block title %}Compra parcelada{% endblock %}

{% block content %}
<section class="m3-card">
    <h2>Nova compra parcelada</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            {% include "_partials/field.html" with field=field %}
        {% endfor %}
        <button type="submit" class="m3-button--filled">Gerar parcelas</button>
    </form>
</section>

<script>
    (function () {
        function setupParcelasPagasField() {
            var totalParcelasInput = document.getElementById("id_total_parcelas");
            var parcelasPagasInput = document.getElementById("id_parcelas_pagas");
            if (!totalParcelasInput || !parcelasPagasInput) {
                return;
            }

            function syncMaxAndClamp() {
                var total = parseInt(totalParcelasInput.value, 10);
                if (Number.isNaN(total)) {
                    return;
                }

                parcelasPagasInput.max = String(total);

                var pagas = parseInt(parcelasPagasInput.value, 10);
                if (Number.isNaN(pagas) || pagas < 0) {
                    parcelasPagasInput.value = "0";
                    return;
                }

                if (pagas > total) {
                    parcelasPagasInput.value = String(total);
                }
            }

            totalParcelasInput.addEventListener("input", syncMaxAndClamp);
            syncMaxAndClamp();
        }

        document.addEventListener("DOMContentLoaded", setupParcelasPagasField);
    })();
</script>
{% endblock %}
