{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Financeiro{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/m3-tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/m3-base.css' %}">
    <link rel="stylesheet" href="{% static 'css/m3-components.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="{% static 'js/money-mask.js' %}"></script>
    <script src="{% static 'js/conditional-fields.js' %}"></script>
    <script src="{% static 'js/popover.js' %}"></script>
</head>
<body>
<header class="m3-top-app-bar">
    <h1 class="m3-top-app-bar__title">Controle Financeiro</h1>
    <nav class="m3-top-app-bar__nav">
        <a class="m3-nav-link" href="{% url 'visualizacao:consolidada' %}" {% if request.resolver_match.view_name == 'visualizacao:consolidada' %}aria-current="page"{% endif %}>Visao consolidada</a>
        <a class="m3-nav-link" href="{% url 'visualizacao:planejamento' %}" {% if request.resolver_match.view_name == 'visualizacao:planejamento' %}aria-current="page"{% endif %}>Planejamento</a>
        <a class="m3-nav-link" href="{% url 'visualizacao:patrimonio' %}" {% if request.resolver_match.view_name == 'visualizacao:patrimonio' %}aria-current="current-page"{% endif %}>Patrimonio</a>
        <a class="m3-nav-link" href="{% url 'visualizacao:comparativo' %}" {% if request.resolver_match.view_name == 'visualizacao:comparativo' %}aria-current="page"{% endif %}>Comparativo</a>
        <a class="m3-nav-link" href="{% url 'contas:listar' %}" {% if request.resolver_match.view_name == 'contas:listar' %}aria-current="page"{% endif %}>Contas</a>
        <a class="m3-nav-link" href="{% url 'importacao:index' %}" {% if request.resolver_match.namespace == 'importacao' %}aria-current="page"{% endif %}>Importar</a>
    </nav>
    <div class="m3-toolbar">
        <button id="theme-toggle" class="m3-button--icon-only" aria-label="Toggle dark mode">
            <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
        </button>
    </div>
</header>
<main class="container">
    <div id="flash-area">
        {% for message in messages %}
        <div class="m3-banner {% if message.tags == 'error' %}m3-banner--error{% else %}m3-banner--info{% endif %}">{{ message }}</div>
        {% endfor %}
    </div>
    {% block content %}{% endblock %}
</main>
<script>
(function() {
    const html = document.documentElement;
    const icon = document.getElementById('theme-icon');
    const toggleBtn = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'light';
    
    function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
        localStorage.setItem('theme', theme);
    }

    setTheme(currentTheme);

    toggleBtn.addEventListener('click', () => {
        const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
    });
})();
</script>
</body>
</html>
